<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Error Profile · Chess Blunder Lab</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body data-run-id="{{ run_id }}">
  <header class="topbar">
    <h1><a href="/" class="back">←</a> Error Profile <span class="muted">{{ run_id }}</span></h1>
    <span class="links">
      <a class="btn" href="/run/{{ run_id }}/review">Review</a>
      <a class="btn primary" href="/run/{{ run_id }}/solve">Solve</a>
    </span>
  </header>

  <main class="container">
    <p class="muted">Your mistakes grouped by type and ranked by total centipawns lost. Fix the top leak first.</p>
    <div id="profile" class="profile-list">loading…</div>
  </main>

  <script src="{{ url_for('static', filename='profile.js') }}"></script>
</body>
</html>
