<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Error Profile · Chess Blunder Lab</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body data-run-id="{{ run_id }}">
  <header class="topbar">
    <h1><a href="/" class="back">←</a> <span class="logo">♟</span> Error Profile <span class="muted" style="font-weight:400;font-size:13px;">{{ run_id }}</span></h1>
    <span class="links" style="display:flex;gap:8px;">
      <a class="btn" href="/run/{{ run_id }}/review">Review</a>
      <a class="btn primary" href="/run/{{ run_id }}/solve">Solve →</a>
    </span>
  </header>

  <main class="container">
    <p class="muted" style="margin:0 0 18px;font-size:14px;">Mistakes grouped by type, ranked by total centipawns lost. Fix the top leak first.</p>
    <div id="profile" class="profile-list">loading…</div>
  </main>

  <script src="{{ url_for('static', filename='profile.js') }}"></script>
</body>
</html>
