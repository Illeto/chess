<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Error Profile · Chess Blunder Lab</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body data-run-id="{{ run_id }}">
  <header class="topbar app-header">
    <div>
      <h1><a href="/" class="back">←</a> Error Profile</h1>
      <p class="topbar-sub">{{ run_id }}</p>
    </div>
    <nav class="tabs">
      <a class="tab active" href="/run/{{ run_id }}/profile">Profile</a>
      <a class="tab" href="/run/{{ run_id }}/review">Review</a>
      <a class="tab" href="/run/{{ run_id }}/solve">Solve</a>
    </nav>
  </header>

  <main class="container run-workspace">
    <section id="profile-summary" class="study-focus compact">
      <div class="focus-main">
        <p class="eyebrow">Top Leak</p>
        <h2 id="profile-title">Loading profile</h2>
        <p id="profile-copy" class="muted">Ranking mistake patterns by impact.</p>
        <div id="profile-actions" class="actions"></div>
      </div>
      <div id="profile-stats" class="focus-stats"></div>
    </section>

    <div id="profile" class="profile-list">loading...</div>
  </main>

  <script src="{{ url_for('static', filename='profile.js') }}"></script>
</body>
</html>
