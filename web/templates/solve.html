<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solve · Chess Blunder Lab</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='board.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/cm-chessboard/assets/chessboard.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/cm-chessboard/assets/extensions/markers/markers.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/cm-chessboard/assets/extensions/promotion-dialog/promotion-dialog.css') }}">
</head>
<body data-run-id="{{ run_id }}">
  <header class="topbar app-header">
    <div>
      <h1><a href="/" class="back">←</a> Solve</h1>
      <p class="topbar-sub">{{ run_id }}</p>
    </div>
    <nav class="tabs">
      <a class="tab" href="/run/{{ run_id }}/profile">Profile</a>
      <a class="tab" href="/run/{{ run_id }}/review">Review</a>
      <a class="tab active" href="/run/{{ run_id }}/solve">Solve</a>
    </nav>
  </header>

  <div class="container"><div id="concept" class="lesson-banner hidden"></div></div>

  <main class="container solve-layout">
    <section class="board-col">
      <div id="board" class="cm-board"></div>
    </section>

    <section class="panel info solve-panel">
      <div class="solve-head">
        <div>
          <p id="counter" class="eyebrow">–</p>
          <h2 id="title">–</h2>
        </div>
        <div class="score-ring">
          <b id="accuracy">0%</b>
          <span>accuracy</span>
        </div>
      </div>
      <p id="turn" class="muted">–</p>
      <div class="metric-strip">
        <div><b id="solved">0</b><span>solved</span></div>
        <div><b id="attempted">0</b><span>attempted</span></div>
        <div><b id="remaining">–</b><span>left</span></div>
      </div>
      <p class="theme-line">Theme <span id="theme">–</span></p>
      <div id="result" class="result hidden"></div>
      <div class="actions">
        <button id="hint" class="btn">Hint</button>
        <button id="skip" class="btn">Skip</button>
        <button id="next" class="btn primary hidden">Next</button>
      </div>
      <p id="done" class="done hidden">All puzzles complete.</p>
    </section>
  </main>

  <script type="module" src="{{ url_for('static', filename='solve.js') }}"></script>
</body>
</html>
