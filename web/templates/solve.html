<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solve · Chess Blunder Lab</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='board.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/cm-chessboard/assets/chessboard.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/cm-chessboard/assets/extensions/markers/markers.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/cm-chessboard/assets/extensions/promotion-dialog/promotion-dialog.css') }}">
</head>
<body data-run-id="{{ run_id }}">
  <header class="topbar">
    <h1><a href="/" class="back">←</a> <span class="logo">♟</span> Solve <span class="muted" style="font-weight:400;font-size:13px;">{{ run_id }}</span></h1>
    <a href="/run/{{ run_id }}/review" class="btn">Review →</a>
  </header>

  <div class="container"><div id="concept" class="card hidden"></div></div>

  <main class="container two-col">
    <section class="board-col">
      <div id="board" class="cm-board"></div>
    </section>

    <section class="card info">
      <h2 id="title">–</h2>
      <p id="turn" class="muted" style="margin:0 0 8px;">–</p>
      <p style="margin:0 0 12px;font-size:14px;color:var(--ink-2);">Theme: <span id="theme" style="color:var(--ink);">–</span></p>
      <div id="result" class="result hidden"></div>
      <div class="actions">
        <button id="hint" class="btn">Hint</button>
        <button id="skip" class="btn">Skip</button>
        <button id="next" class="btn primary hidden">Next →</button>
      </div>
      <p class="score">Solved <b id="solved">0</b> / <span id="attempted">0</span> attempted
        &nbsp;·&nbsp; <span id="counter" class="muted">–</span></p>
      <p id="done" class="muted hidden" style="margin-top:14px;">All puzzles complete 🎉</p>
    </section>
  </main>

  <script type="module" src="{{ url_for('static', filename='solve.js') }}"></script>
</body>
</html>
