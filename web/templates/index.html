<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chess Blunder Lab</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
  <header class="topbar app-header">
    <div>
      <h1>Chess Blunder Lab</h1>
      <p class="topbar-sub">Personal tactics review from your own games</p>
    </div>
    <span id="engine-status" class="engine">Checking engine...</span>
  </header>

  <main class="container dashboard">
    <section id="study-focus" class="study-focus">
      <div class="focus-main">
        <p class="eyebrow">Study Today</p>
        <h2 id="focus-title">Loading latest run</h2>
        <p id="focus-copy" class="muted">Finding your most useful drill.</p>
        <div id="focus-actions" class="actions"></div>
      </div>
      <div id="focus-stats" class="focus-stats"></div>
    </section>

    <section class="panel analysis-panel">
      <div class="section-head">
        <div>
          <h2>New Analysis</h2>
          <p class="muted">Fetch recent games and rebuild your study set.</p>
        </div>
      </div>
      <form id="analyze-form" class="form-grid" autocomplete="off">
        <label>Chess.com username
          <input name="username" type="text" placeholder="e.g. your-username" required>
        </label>
        <label>Months
          <input name="months" type="number" value="3" min="1" max="24">
        </label>
        <label>Max games
          <input name="max_games" type="number" value="25" min="1" max="500">
        </label>
        <label>Time class
          <select name="time_class">
            <option value="">any</option>
            <option value="rapid">rapid</option>
            <option value="blitz">blitz</option>
            <option value="bullet">bullet</option>
            <option value="daily">daily</option>
          </select>
        </label>
        <label>Depth
          <input name="depth" type="number" value="10" min="4" max="20">
        </label>
        <button type="submit" class="btn primary">Analyze</button>
      </form>
      <div id="job" class="job hidden">
        <div class="job-phase"><span id="job-phase">queued</span> <span id="job-label" class="muted"></span></div>
        <div class="bar"><div id="job-bar" class="bar-fill"></div></div>
        <div id="job-error" class="error hidden"></div>
      </div>
    </section>

    <section class="panel">
      <div class="section-head">
        <div>
          <h2>Recent Runs</h2>
          <p class="muted">Open a previous report or keep drilling.</p>
        </div>
      </div>
      <div id="runs" class="runs">loading...</div>
    </section>
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
