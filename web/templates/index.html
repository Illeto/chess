<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chess Blunder Lab</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
  <header class="topbar">
    <h1><span class="logo">♟</span> Chess Blunder Lab</h1>
    <span id="engine-status" class="engine">checking engine…</span>
  </header>

  <main class="container">
    <section class="card">
      <h2>New analysis</h2>
      <form id="analyze-form" class="form-grid" autocomplete="off">
        <label>Chess.com username
          <input name="username" type="text" placeholder="e.g. hikaru" required>
        </label>
        <label>Months back
          <input name="months" type="number" value="3" min="1" max="24">
        </label>
        <label>Max games
          <input name="max_games" type="number" value="25" min="1" max="500">
        </label>
        <label>Time class
          <select name="time_class">
            <option value="">Any</option>
            <option value="rapid">Rapid</option>
            <option value="blitz">Blitz</option>
            <option value="bullet">Bullet</option>
            <option value="daily">Daily</option>
          </select>
        </label>
        <label>Engine depth
          <input name="depth" type="number" value="10" min="4" max="20">
        </label>
        <button type="submit" class="btn primary">Analyze games →</button>
      </form>
      <div id="job" class="job hidden">
        <div class="job-phase"><span id="job-phase">Queued</span> <span id="job-label" class="muted"></span></div>
        <div class="bar"><div id="job-bar" class="bar-fill"></div></div>
        <div id="job-error" class="error hidden"></div>
      </div>
    </section>

    <section class="card">
      <h2>Past runs</h2>
      <div id="runs" class="runs">loading…</div>
    </section>
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
